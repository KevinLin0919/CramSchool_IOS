name: iOS starter workflow

on:
  push:
    branches: [ "main", "coreml-xfeat" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile check (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild build \
            -project AutoGradeScanner.xcodeproj \
            -scheme AutoGradeScanner \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator"

  ipa:
    name: Build unsigned .ipa for sideloading
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build (Release, device, unsigned)
        run: |
          xcodebuild build \
            -project AutoGradeScanner.xcodeproj \
            -scheme AutoGradeScanner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package .ipa
        run: |
          mkdir Payload
          cp -R "build/Build/Products/Release-iphoneos/AutoGradeScanner.app" Payload/
          zip -qry AutoGradeScanner.ipa Payload
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGradeScanner-ipa
          path: AutoGradeScanner.ipa
